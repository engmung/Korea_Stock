services:
  stock-agent:
    build: .
    container_name: korea-stock-agent
    restart: unless-stopped
    ports:
      - "8003:8003"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    environment:
      - TZ=Asia/Seoul
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8003/')"]
      interval: 30s
      timeout: 10s
      retries: 3
